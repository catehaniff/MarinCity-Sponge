function TerrainMap() {
  const ref = useRef(null);

  const [ready, setReady] = useState(false);

  useEffect(() => {
    if (mapRef.current) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
    document.head.appendChild(link);
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";

      const L = window.L;
      const map = L.map(ref.current, { center: [37.8735, -122.5115], zoom: 15, scrollWheelZoom: false });
      L.tileLayer("https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}", { maxZoom: 20, attribution: "Google Terrain" }).addTo(map);

      MAP_SITES.forEach((site) => {
        const icon = L.divIcon({
          className: "",
          html: '<div style="width:28px;height:28px;border-radius:50%;background:' + site.color + ';border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;cursor:pointer;">' + site.id + '</div>',
          iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -18],
        });
        L.marker([site.lat, site.lng], { icon }).addTo(map).bindPopup(
          '<div style="max-width:260px;font-family:sans-serif;">' +
            '<div style="font-weight:700;font-size:13px;color:#2a2a2a;margin-bottom:8px;line-height:1.3;">' + site.name + '</div>' +
            '<div style="font-size:11px;font-weight:600;color:#C0392B;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;">Impacted</div>' +
            '<div style="font-size:12px;color:#666;line-height:1.5;margin-bottom:8px;">' + site.impact + '</div>' +
            '<div style="font-size:11px;font-weight:600;color:#1A6B52;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;">Proposed solution</div>' +
            '<div style="font-size:12px;color:#666;line-height:1.5;">' + site.solution + '</div>' +
          '</div>', { maxWidth: 280 }
        );
      });

      L.polygon([
        [37.866,-122.518],[37.866,-122.508],[37.870,-122.506],
        [37.876,-122.504],[37.880,-122.508],[37.881,-122.516],
        [37.878,-122.519],[37.873,-122.518],[37.869,-122.517],
      ], { color: "#1A6B52", weight: 2, opacity: 0.3, fillColor: "#1A6B52", fillOpacity: 0.05, dashArray: "8 6" }).addTo(map);

      L.polyline([
        [37.879,-122.516],[37.876,-122.514],[37.874,-122.513],
        [37.872,-122.512],[37.871,-122.510],[37.873,-122.509],[37.875,-122.507],
      ], { color: "#2E86C1", weight: 2.5, opacity: 0.45, dashArray: "6 8" }).addTo(map);

      mapRef.current = map;
      setReady(true);
      setTimeout(() => map.invalidateSize(), 300);
    };
    document.head.appendChild(s);
    return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
  }, []);

    <div>

function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function FadeIn({ children, delay = 0, style = {} }) {
  const [ref, visible] = useInView();
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(32px)",
      transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`,
      ...style,
    }}>
      {children}
    </div>
  );
}

              fontFamily: FONTS.body, fontSize: 13, color: COLORS.slate, lineHeight: 1.6,
            }}>{study.relevance}</div>

          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
            {study.techniques.map((t, i) => (
              <Badge key={i} bg={COLORS.mint} color={COLORS.deep}>{t}</Badge>
            ))}
          </div>
          <a href={study.link} target="_blank" rel="noopener noreferrer" style={{
            display: "inline-flex", alignItems: "center", gap: 6,
            fontFamily: FONTS.body, fontSize: 13, fontWeight: 600,
            color: COLORS.teal, textDecoration: "none",
            padding: "8px 16px", borderRadius: 8,
            border: `1px solid ${COLORS.teal}`,
            transition: "all 0.2s",
            background: hover ? COLORS.mint : "transparent",
          }}>
            {study.linkLabel} <span style={{ fontSize: 14 }}>↗</span>
          </a>
        </div>
      </div>
    </FadeIn>
  );
}

function DataRow({ label, value, sub, highlight }) {
  return (
    <div style={{
      display: "flex", justifyContent: "space-between", alignItems: "baseline",
      padding: "10px 0", borderBottom: "1px solid #f0ece4",
    }}>
      <span style={{ fontFamily: FONTS.body, fontSize: 14, color: COLORS.muted, flex: 1 }}>{label}</span>
      <div style={{ textAlign: "right" }}>
        <span style={{
          fontFamily: FONTS.body, fontSize: 15, fontWeight: 600,
          color: highlight ? COLORS.coral : COLORS.slate,
        }}>{value}</span>
        {sub && <div style={{ fontFamily: FONTS.body, fontSize: 11, color: COLORS.muted, marginTop: 1 }}>{sub}</div>}
      </div>
    </div>
  );
}

function ActionChecklist() {
  const [checks, setChecks] = useState({});
  const [expandedPhase, setExpandedPhase] = useState("This week");

  const toggle = (key) => setChecks(prev => ({ ...prev, [key]: !prev[key] }));
  const phaseProgress = (phase) => {
    const items = ACTION_STEPS.find(p => p.phase === phase)?.items || [];
    const done = items.filter((_, i) => checks[`${phase}-${i}`]).length;
    return { done, total: items.length };
  };

  return (
    <FadeIn delay={0.1}>
      <div style={{ display: "grid", gap: 16 }}>
        {ACTION_STEPS.map((phase) => {
          const isOpen = expandedPhase === phase.phase;
          const prog = phaseProgress(phase.phase);
          return (
            <div key={phase.phase} style={{
              background: "#fff", borderRadius: 16, border: "1px solid #e0e0e0", overflow: "hidden",
            }}>
              <div
                onClick={() => setExpandedPhase(isOpen ? null : phase.phase)}
                style={{
                  display: "flex", alignItems: "center", gap: 14,
                  padding: "18px 24px", cursor: "pointer",
                  background: isOpen ? phase.bg : "transparent",
                  transition: "background 0.2s",
                }}
              >
                <div style={{
                  width: 10, height: 10, borderRadius: "50%",
                  background: phase.color, flexShrink: 0,
                }} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: FONTS.display, fontSize: 18, color: COLORS.slate }}>{phase.phase}</div>
                  <div style={{ fontFamily: FONTS.body, fontSize: 12, color: COLORS.muted }}>{phase.items.length} actions · {prog.done} completed</div>
                </div>
                <div style={{
                  width: 60, height: 6, borderRadius: 3, background: "#e8e4dc", overflow: "hidden",
                }}>
                  <div style={{
                    width: `${prog.total > 0 ? (prog.done / prog.total) * 100 : 0}%`,
                    height: "100%", borderRadius: 3, background: phase.color,
                    transition: "width 0.3s ease",
                  }} />
                </div>
                <span style={{
                  fontSize: 18, color: COLORS.muted, transition: "transform 0.3s",
                  transform: isOpen ? "rotate(180deg)" : "none",
                }}>▾</span>
              </div>
              {isOpen && (
                <div style={{ padding: "0 24px 20px" }}>
                  {phase.items.map((item, i) => {
                    const key = `${phase.phase}-${i}`;
                    const done = checks[key];
                    return (
                      <div key={i} style={{
                        display: "flex", gap: 14, padding: "16px 0",
                        borderBottom: i < phase.items.length - 1 ? "1px solid #f0ece4" : "none",
                        opacity: done ? 0.55 : 1, transition: "opacity 0.3s",
                      }}>
                        <div
                          onClick={() => toggle(key)}
                          style={{
                            width: 22, height: 22, borderRadius: 6, flexShrink: 0, marginTop: 2,
                            border: done ? "none" : `2px solid ${phase.color}`,
                            background: done ? phase.color : "transparent",
                            display: "flex", alignItems: "center", justifyContent: "center",
                            cursor: "pointer", transition: "all 0.2s",
                            fontSize: 13, color: "#fff",
                          }}
                        >{done ? "✓" : ""}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{
                            fontFamily: FONTS.body, fontSize: 14, fontWeight: 600,
                            color: COLORS.slate, lineHeight: 1.4,
                            textDecoration: done ? "line-through" : "none",
                          }}>{item.action}</div>
                          <div style={{
                            fontFamily: FONTS.body, fontSize: 13, color: COLORS.muted,
                            lineHeight: 1.6, marginTop: 6,
                          }}>{item.detail}</div>
                          <div style={{ display: "flex", gap: 10, marginTop: 8, flexWrap: "wrap", alignItems: "center" }}>
                            {item.who && (
                              <span style={{
                                fontFamily: FONTS.body, fontSize: 11, fontWeight: 600,
                                color: phase.color, background: phase.bg,
                                padding: "3px 10px", borderRadius: 12,
                              }}>👤 {item.who}</span>
                            )}
                            {item.link && (
                              <a href={item.link} target="_blank" rel="noopener noreferrer" style={{
                                fontFamily: FONTS.body, fontSize: 11, fontWeight: 600,
                                color: COLORS.teal, textDecoration: "none",
                                padding: "3px 10px", borderRadius: 12,
                                border: `1px solid ${COLORS.teal}`,
                              }}>{item.linkLabel || "Link"} ↗</a>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </FadeIn>
  );
}
